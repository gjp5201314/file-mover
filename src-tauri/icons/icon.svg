<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)"/>

  <!-- Main folder -->
  <path d="M58 95 L98 95 L108 75 L158 75 L168 95 L198 95 L198 185 L58 185 Z"
        fill="url(#folderGrad)" stroke="#D97706" stroke-width="3"/>

  <!-- Folder tab highlight -->
  <path d="M58 95 L98 95 L108 75 L120 75 L110 85 L62 85 Z"
        fill="#FEF3C7" opacity="0.6"/>

  <!-- Upload arrow (outbound) -->
  <g transform="translate(70, 115)">
    <path d="M0 45 L0 15 Q0 0 15 0 L45 0 Q60 0 60 15 L60 45"
          fill="none" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <path d="M30 50 L30 10 M15 25 L30 10 L45 25"
          fill="none" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Download arrow (inbound) -->
  <g transform="translate(126, 115)">
    <path d="M0 0 L0 30 Q0 45 15 45 L45 45 Q60 45 60 30 L60 0"
          fill="none" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>
    <path d="M30 -5 L30 35 M15 20 L30 35 L45 20"
          fill="none" stroke="#34D399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- File lines inside folder -->
  <rect x="78" y="155" width="40" height="6" rx="2" fill="#D97706" opacity="0.5"/>
  <rect x="78" y="167" width="25" height="6" rx="2" fill="#D97706" opacity="0.5"/>

  <!-- Gear/settings accent -->
  <circle cx="200" cy="56" r="28" fill="#1E1B4B" opacity="0.9"/>
  <g transform="translate(200, 56)" fill="#A5B4FC">
    <circle cx="0" cy="-12" r="5"/>
    <circle cx="0" cy="12" r="5"/>
    <circle cx="-12" cy="0" r="5"/>
    <circle cx="12" cy="0" r="5"/>
    <circle cx="-9" cy="-9" r="5"/>
    <circle cx="9" cy="9" r="5"/>
    <circle cx="-9" cy="9" r="5"/>
    <circle cx="9" cy="-9" r="5"/>
    <circle cx="0" cy="0" r="8"/>
  </g>
</svg>